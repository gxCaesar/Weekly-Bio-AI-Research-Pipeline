name: Daily Bio+AI Research Report

on:
  schedule:
    # 02:00 Asia/Shanghai = 18:00 UTC (previous day)
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    env:
      REPORT_RECIPIENT: cgx510510@gmail.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate report
        run: python scripts/daily_report.py

      - name: Build enhanced idea module
        run: python scripts/strong_idea.py

      - name: Send report email
        env:
          SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          SMTP_PASS: ${{ secrets.GMAIL_SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.GMAIL_FROM_EMAIL }}
        run: |
          if [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASS" ] || [ -z "$FROM_EMAIL" ]; then
            echo "Missing SMTP secrets; skip email sending."
            exit 0
          fi
          python scripts/send_email.py \
            --smtp-user "$SMTP_USER" \
            --smtp-pass "$SMTP_PASS" \
            --from-email "$FROM_EMAIL" \
            --to-email "$REPORT_RECIPIENT"

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/*.md reports/ideas/*.json
          if git diff --cached --quiet; then
            echo "No report changes to commit"
            exit 0
          fi
          git commit -m "chore: daily bio+ai report"
          git push
